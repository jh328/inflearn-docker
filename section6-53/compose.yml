# Docker Compose CLI 주요 명령어

# docker compose up은 compose.yml에 정의된 컨테이너를 "포그라운드"에서 실행
# 터미널을 점유하기 때문에 백그라운드에서 실행하고 싶다면 -d 옵션 사용
docker compose up # 포그라운드 실행
docker compose up -d # 백그라운드 실행


# 컨테이너 상태 확인
# docker ps 현재 실행 중인 "모든" 컨테이너를 보여주지만,
# docker compose ps는 compose.yml에 정의된 컨테이너만 "필터링"해서 보여줌
docker compose ps # yml에 정의된 것 중 실행 중인 컨테이너
docker compose ps -a # yml에 정의된 것 중지된 컨테이너까지 전부

# 로그 확인
# compose.yml 정의된 모든 컨테이너의 로그를 한꺼번에 확인할 수 있음
docker compose logs


# 이미지 빌드 후 실행
# Dockerfile 수정한 뒤 이미지를 다시 빌드해서 컨테이너를 실행해야 할 때 사용
# Docker Hub에서 이미지를 받아서 사용하는 경우 해당되지 않음
docker compose up --build


# 이미지 최신화(pull)
# docker compose up 하면 로컬에 이미지가 이미 있을 경우 그대로 사용
# Docker Hub에 더 새로운 버전이 올라왔더라도 자동으로 갱신되지 않기 때문에,
# 최신 이미지를 받고 싶다면 pull을 먼저 실행
docker compose pull # yml에 정의된 이미지를 Docker Hub에서 최신으로 다운로드
docker compose up -d # 최신 이미지로 컨테이너 재실행